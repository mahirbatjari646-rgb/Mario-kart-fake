<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Retro Kart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <!-- Menuja për ndryshimin e Hartës -->
        <div id="map-selector">
            <label for="maps">Zgjidh Hartën: </label>
            <select id="maps">
                <option value="stadium">Stadium 🏟️</option>
                <option value="farm">Fermë 🚜</option>
                <option value="volcano">Vullkan 🌋</option>
            </select>
        </div>

        <canvas id="gameCanvas" width="400" height="300"></canvas>

        <div id="mobile-controls">
            <button id="btn-left" class="ctrl-btn">◀</button>
            <div class="vertical-btns">
                <button id="btn-up" class="ctrl-btn">▲</button>
                <button id="btn-down" class="ctrl-btn">▼</button>
            </div>
            <button id="btn-right" class="ctrl-btn">▶</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
