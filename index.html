<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Retro Kart 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <!-- Paneli i Kontrollit të Hartës dhe Vështirësisë -->
        <div id="control-panel">
            <select id="maps">
                <option value="stadium">Stadium 🏟️</option>
                <option value="farm">Fermë 🌲</option>
                <option value="volcano">Vullkan 🌋</option>
            </select>
            
            <select id="difficulty">
                <option value="easy">EASY 😊</option>
                <option value="medium" selected>MEDIUM 😐</option>
                <option value="hard">HARD 🔥</option>
            </select>
        </div>

        <!-- Ekrani i Rezultatit (Kupa) -->
        <div id="end-screen" class="hidden">
            <h1 id="end-title">Urime! 🏆</h1>
            <p id="end-msg">Ke fituar Kupën e Artë!</p>
            <button onclick="restartGame()">Luaj Përsëri</button>
        </div>

        <!-- Gjeje këtë rresht këtu: -->
<canvas id="gameCanvas" width="1920" height="768"></canvas>

        <div id="mobile-controls">
            <button id="btn-left" class="ctrl-btn">◀</button>
            <div class="vertical-btns">
                <button id="btn-up" class="ctrl-btn">▲</button>
                <button id="btn-down" class="ctrl-btn">▼</button>
            </div>
            <button id="btn-right" class="ctrl-btn">▶</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
